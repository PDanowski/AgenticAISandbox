name: Copilot SDLC Orchestrator

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to orchestrate"
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  orchestrate:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'sdlc-request')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve issue number
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post SDLC orchestration comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.meta.outputs.issue_number }}");
            const body = [
              "## SDLC Multi-Agent Automation Started",
              "",
              "This issue is now in Architect -> DevOps/Developer -> QA lifecycle.",
              "",
              "### Architect phase",
              "- Use `.github/prompts/architect-agent.prompt.md`.",
              "- Produce component/sequence/flow diagrams and split work items.",
              "",
              "### DevOps + Developer phase",
              "- Use `.github/prompts/devops-agent.prompt.md` and `.github/prompts/developer-agent.prompt.md`.",
              "- Implement infra + code with close collaboration.",
              "",
              "### QA phase",
              "- Use `.github/prompts/qa-agent.prompt.md`.",
              "- Validate smoke/API/regression/e2e coverage where feasible.",
              "",
              "### PR requirements",
              "- Use `.github/pull_request_template.md`.",
              "- Require manual review by Architect + User before merge.",
              "",
              "Suggested next command in Copilot Chat:",
              "```text",
              "Use Architect Agent prompt behavior for issue #" + issueNumber + " and generate architecture + work items.",
              "```"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

